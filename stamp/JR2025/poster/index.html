  <style>
    /* 全体：横並びにして端で折り返す設定 */
    ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* 各アイテム：文字と画像を縦に並べて中央揃え */
    li {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 150px;
      margin-bottom: 15px;
    }

    /* 画像のサイズ調整 */
    .thumbnail {
      display: block;
      margin-top: 8px;
      width: 100%;
      max-width: 140px;
      height: auto;
      border: 1px solid #ccc;
      background-color: #f9f9f9; /* 読み込み前の下地 */
    }

    /* リンクテキスト：高さのズレを防ぎ、中央に配置 */
    li a {
      text-align: center;
      font-size: 14px;
      text-decoration: none;
      word-break: break-all;
      min-height: 3em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
